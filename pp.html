<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conscious Control Deck - Editor Mode</title>
    <style>
        :root {
            --grid-bg: #f5f6f8;
            --grid-dots: #c5c8d0;
            --sidebar-bg: #111318;
            --sidebar-border: #222530;
            --text-dark: #121212;
            --text-light: #ffffff;
        }

        body.dark-grid {
            --grid-bg: #0c0d12;
            --grid-dots: #2c2f3a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Arial Rounded MT Bold", "Nunito", -apple-system, sans-serif;
        }

        body {
            background-color: var(--grid-bg);
            background-image: radial-gradient(var(--grid-dots) 2px, transparent 2px);
            background-size: 24px 24px;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
            user-select: none;
            transition: background-color 0.3s;
        }

        /* --- UI CONTROLS --- */
        .menu-toggle {
            position: fixed;
            left: 15px;
            top: 15px;
            width: 50px;
            height: 50px;
            background: #3b82f6;
            border: 3px solid #000000;
            border-radius: 12px;
            box-shadow: 3px 3px 0px #000;
            cursor: pointer;
            z-index: 1001;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-toggle:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }

        /* --- LEFT SIDEBAR (SHEETS & TOOLS) --- */
        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100%;
            background-color: var(--sidebar-bg);
            border-right: 4px solid #000000;
            z-index: 1000;
            padding: 80px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 10px 0 0 rgba(0, 0, 0, 0.15);
            overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar h2 { color: #fff; font-size: 1.4rem; text-shadow: 1px 1px 0px #000; border-bottom: 2px solid #333; padding-bottom: 5px;}
        
        .menu-btn {
            background: #ffffff; color: #000; border: 3px solid #000;
            padding: 10px; border-radius: 8px; font-weight: bold;
            cursor: pointer; text-align: center; box-shadow: 3px 3px 0px #000;
            transition: all 0.1s; width: 100%; margin-bottom: 5px;
        }
        .menu-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }
        .menu-btn.red { background: #ef4444; color: #fff; }
        .menu-btn.blue { background: #3b82f6; color: #fff; }
        .menu-btn.green { background: #10b981; color: #fff; }
        
        .sheet-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px;}
        .sheet-item {
            background: #2a2d3a; color: #fff; padding: 8px; border-radius: 6px;
            border: 2px solid #000; cursor: pointer; display: flex; justify-content: space-between;
        }
        .sheet-item.active { background: #facc15; color: #000; font-weight: bold; }

        /* --- RIGHT SIDEBAR (CONTEXT VAULT) --- */
        .context-panel {
            position: fixed;
            right: -350px;
            top: 0;
            width: 350px;
            height: 100%;
            background-color: var(--sidebar-bg);
            border-left: 4px solid #000000;
            z-index: 1000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: right 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: -10px 0 0 rgba(0, 0, 0, 0.15);
        }
        .context-panel.open { right: 0; }
        .context-panel h2 { color: #facc15; font-size: 1.4rem; border-bottom: 2px solid #333; padding-bottom: 5px;}
        .context-target { color: #fff; font-size: 1.1rem; margin-bottom: 10px; word-break: break-all;}
        .context-area {
            flex-grow: 1; width: 100%; background: #1a1d24; color: #fff;
            border: 3px solid #000; border-radius: 8px; padding: 15px;
            font-size: 1rem; resize: none; outline: none;
        }
        .context-area:focus { border-color: #3b82f6; }

        /* --- DRAGGABLE CARDS --- */
        #board-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        .card {
            position: absolute; width: 250px; border: 4px solid #000000;
            border-radius: 20px; box-shadow: 5px 5px 0px #000000;
            overflow: hidden; background-color: #111; touch-action: none;
        }
        .card.dragging { z-index: 999 !important; transform: scale(1.02); cursor: grabbing; box-shadow: 10px 10px 0px rgba(0,0,0,0.5); }

        /* Header Style */
        .card-header {
            padding: 12px 30px 12px 10px; /* Room for delete btn */
            text-align: center; font-size: 1.4rem; font-weight: 900;
            color: #ffffff; border-bottom: 4px solid #000000;
            letter-spacing: 0.5px; position: relative; cursor: grab;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 2px 3px 0 #000;
        }
        .card-header:active { cursor: grabbing; }
        
        .delete-card-btn {
            position: absolute; right: 5px; top: 5px; background: #ef4444; color: white;
            border: 2px solid #000; border-radius: 50%; width: 24px; height: 24px;
            font-size: 14px; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; justify-content: center; z-index: 10;
        }

        /* Body & List Styles */
        .card-body { padding: 15px; min-height: 100px; display: flex; flex-direction: column; gap: 8px;}
        .card-body ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .card-body li {
            font-size: 0.95rem; font-weight: bold; display: flex;
            align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); padding: 5px 8px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.5);
        }
        
        .item-text { flex-grow: 1; word-break: break-word; outline: none; }
        .item-actions { display: flex; gap: 4px; margin-left: 8px; }
        .icon-btn {
            background: #fff; border: 2px solid #000; border-radius: 4px;
            width: 26px; height: 26px; cursor: pointer; font-size: 12px;
            display: flex; align-items: center; justify-content: center; box-shadow: 1px 1px 0 #000;
        }
        .icon-btn:active { transform: translate(1px, 1px); box-shadow: 0 0 0 #000; }
        .icon-btn.context-btn { background: #facc15; }
        .icon-btn.delete-btn { background: #ef4444; color: white; }

        .add-item-btn {
            background: rgba(255,255,255,0.2); border: 2px dashed #000; color: #fff;
            padding: 5px; border-radius: 6px; font-weight: bold; cursor: pointer;
            text-align: center; margin-top: 5px; text-shadow: 1px 1px 0 #000;
        }
        .add-item-btn:hover { background: rgba(255,255,255,0.3); }

        /* Edit Mode Highlights */
        [contenteditable="true"]:focus { outline: 2px dashed #fff; background: rgba(255, 255, 255, 0.2); border-radius: 4px; padding: 2px; }

        /* THEMES */
        .card.youtube .card-header { background: #ef4444; }
        .card.youtube .card-body { background: #b91c1c; color: #ffffff; }
        
        .card.tiktok .card-header { background: #1e1b4b; }
        .card.tiktok .card-body { background: #0f172a; color: #ffffff; }
        
        /* Fixed Clash of Clans: Header background gold, text white with black outline */
        .card.coc .card-header { background: #facc15; color: #ffffff; }
        .card.coc .card-body { background: #eab308; color: #000; }
        .card.coc .item-text { color: #000; }
        .card.coc .add-item-btn { color: #000; border-color: rgba(0,0,0,0.5); text-shadow: none;}
        
        .card.clones .card-header { background: #6b7280; }
        .card.clones .card-body { background: #374151; color: #ffffff; }
        
        .card.games .card-header { background: #f97316; }
        .card.games .card-body { background: #ea580c; color: #ffffff; }

        .card.custom .card-header { background: #8b5cf6; }
        .card.custom .card-body { background: #5b21b6; color: #ffffff; }
    </style>
</head>
<body>

    <!-- Left Menu Toggle -->
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- LEFT SIDEBAR: SHEETS & TOOLS -->
    <div class="sidebar" id="sidebar">
        <h2>Sheets / Boards</h2>
        <div class="sheet-list" id="sheet-list-container">
            <!-- Sheets injected here -->
        </div>
        <button class="menu-btn green" onclick="createNewSheet()">+ New Sheet</button>
        
        <h2 style="margin-top: 20px;">Editor Tools</h2>
        <button class="menu-btn blue" onclick="addCard()">+ Add New Card</button>
        <button class="menu-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
        
        <hr style="border: 1px solid var(--sidebar-border); margin-top: 10px;">
        <p style="color: #8a8f98; font-size: 0.8rem;">Tap '📝' on any item to open the Context Vault.</p>
        <button class="menu-btn red" onclick="toggleSidebar()" style="margin-top: auto;">Close Menu</button>
    </div>

    <!-- RIGHT SIDEBAR: CONTEXT VAULT -->
    <div class="context-panel" id="context-panel">
        <h2>Context Vault</h2>
        <p style="color: #8a8f98; font-size: 0.85rem;">Why does this exist? What are you doing here?</p>
        <div class="context-target" id="context-target-name">Item Name</div>
        <textarea class="context-area" id="context-textarea" placeholder="Write your context, explanations, and thoughts here..."></textarea>
        <button class="menu-btn green" onclick="saveContext()">💾 Save Context</button>
        <button class="menu-btn red" onclick="closeContextPanel()">Close Vault</button>
    </div>

    <!-- BOARD CANVAS -->
    <div id="board-container"></div>

    <script>
        // --- 1. DATA STRUCTURE & STATE MANAGEMENT ---
        
        const defaultData = {
            activeSheetId: "sheet_main",
            sheets: {
                "sheet_main": {
                    id: "sheet_main",
                    name: "Main Map",
                    cards: [
                        { id: "c1", theme: "youtube", title: "Youtube", x: 50, y: 100, items: [
                            { id: "i1", text: "1. FancyToast501", context: "" },
                            { id: "i2", text: "2. FancyToastOsu!", context: "" },
                            { id: "i3", text: "3. OverDrive", context: "" }
                        ]},
                        { id: "c2", theme: "tiktok", title: "TikTok", x: 320, y: 100, items: [
                            { id: "i4", text: "1. Xi", context: "" }
                        ]},
                        { id: "c3", theme: "coc", title: "Clash Of Clans", x: 590, y: 100, items: [
                            { id: "i5", text: "1. FancyToast501 (13)", context: "" },
                            { id: "i6", text: "2. 501 (8)", context: "" },
                            { id: "i7", text: "3. Toast (4)", context: "" }
                        ]},
                        { id: "c4", theme: "clones", title: "Clone", x: 50, y: 350, items: [
                            { id: "i8", text: "1. Room 5 Clone", context: "" },
                            { id: "i9", text: "2. Froll Clone", context: "" },
                            { id: "i10", text: "3. Pico Piyo Clone", context: "" },
                            { id: "i11", text: "4. Heaven Clone", context: "" }
                        ]},
                        { id: "c5", theme: "games", title: "Games", x: 590, y: 350, items: [
                            { id: "i12", text: "1. Bistro Heros", context: "" },
                            { id: "i13", text: "2. Brawl Stars", context: "" },
                            { id: "i14", text: "3. PVZ 1/2", context: "" },
                            { id: "i15", text: "4. Roblox", context: "" },
                            { id: "i16", text: "5. Chess", context: "" }
                        ]}
                    ]
                }
            }
        };

        // Load from LocalStorage or use Default
        let appData = JSON.parse(localStorage.getItem('conscious_map_v2'));
        if (!appData) {
            appData = defaultData;
            saveData();
        }

        let currentContextItemId = null;
        let currentContextCardId = null;

        function saveData() {
            localStorage.setItem('conscious_map_v2', JSON.stringify(appData));
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // --- 2. RENDERING ENGINE ---

        function renderApp() {
            renderSidebarSheets();
            renderBoard();
        }

        function renderSidebarSheets() {
            const container = document.getElementById('sheet-list-container');
            container.innerHTML = '';
            
            Object.values(appData.sheets).forEach(sheet => {
                const div = document.createElement('div');
                div.className = `sheet-item ${sheet.id === appData.activeSheetId ? 'active' : ''}`;
                
                const nameSpan = document.createElement('span');
                nameSpan.innerText = sheet.name;
                nameSpan.onclick = () => switchSheet(sheet.id);
                
                div.appendChild(nameSpan);

                // Don't allow deleting the very last sheet
                if (Object.keys(appData.sheets).length > 1) {
                    const delBtn = document.createElement('span');
                    delBtn.innerText = '🗑️';
                    delBtn.style.cursor = 'pointer';
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteSheet(sheet.id); };
                    div.appendChild(delBtn);
                }

                container.appendChild(div);
            });
        }

        function renderBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '';
            
            const currentSheet = appData.sheets[appData.activeSheetId];
            if(!currentSheet) return;

            currentSheet.cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${card.theme}`;
                cardEl.style.left = `${card.x}px`;
                cardEl.style.top = `${card.y}px`;
                cardEl.dataset.cardId = card.id;
                cardEl.style.zIndex = index + 1;

                // Header
                let itemsHtml = '';
                card.items.forEach(item => {
                    itemsHtml += `
                        <li data-item-id="${item.id}">
                            <span class="item-text" contenteditable="true" onblur="updateItemText('${card.id}', '${item.id}', this.innerText)">${item.text}</span>
                            <div class="item-actions">
                                <button class="icon-btn context-btn" onclick="openContextPanel('${card.id}', '${item.id}')" title="Context Vault">📝</button>
                                <button class="icon-btn delete-btn" onclick="deleteItem('${card.id}', '${item.id}')" title="Delete Item">×</button>
                            </div>
                        </li>
                    `;
                });

                cardEl.innerHTML = `
                    <div class="card-header">
                        <span contenteditable="true" onblur="updateCardTitle('${card.id}', this.innerText)">${card.title}</span>
                        <button class="delete-card-btn" onclick="deleteCard('${card.id}')" title="Delete Card">×</button>
                    </div>
                    <div class="card-body">
                        <ul>${itemsHtml}</ul>
                        <button class="add-item-btn" onclick="addItem('${card.id}')">+ Add Item</button>
                    </div>
                `;

                // Attach Drag Listeners to Header
                const header = cardEl.querySelector('.card-header');
                header.addEventListener('pointerdown', handleDragStart);

                container.appendChild(cardEl);
            });
        }

        // --- 3. EDITOR ACTIONS ---

        function updateCardTitle(cardId, newText) {
            const sheet = appData.sheets[appData.activeSheetId];
            const card = sheet.cards.find(c => c.id === cardId);
            if(card) { card.title = newText; saveData(); }
        }

        function updateItemText(cardId, itemId, newText) {
            const sheet = appData.sheets[appData.activeSheetId];
            const card = sheet.cards.find(c => c.id === cardId);
            if(card) {
                const item = card.items.find(i => i.id === itemId);
                if(item) { item.text = newText; saveData(); }
            }
        }

        function addCard() {
            const themes = ['youtube', 'tiktok', 'coc', 'clones', 'games', 'custom'];
            const randomTheme = themes[Math.floor(Math.random() * themes.length)];
            
            const newCard = {
                id: 'c_' + generateId(),
                theme: randomTheme,
                title: "New Category",
                x: window.innerWidth / 2 - 125,
                y: window.innerHeight / 2 - 100,
                items: []
            };
            
            appData.sheets[appData.activeSheetId].cards.push(newCard);
            saveData();
            renderBoard();
        }

        function deleteCard(cardId) {
            if(confirm("Delete this entire card?")) {
                const sheet = appData.sheets[appData.activeSheetId];
                sheet.cards = sheet.cards.filter(c => c.id !== cardId);
                saveData();
                renderBoard();
            }
        }

        function addItem(cardId) {
            const sheet = appData.sheets[appData.activeSheetId];
            const card = sheet.cards.find(c => c.id === cardId);
            if(card) {
                card.items.push({ id: 'i_' + generateId(), text: "New Item", context: "" });
                saveData();
                renderBoard();
            }
        }

        function deleteItem(cardId, itemId) {
            const sheet = appData.sheets[appData.activeSheetId];
            const card = sheet.cards.find(c => c.id === cardId);
            if(card) {
                card.items = card.items.filter(i => i.id !== itemId);
                saveData();
                renderBoard();
            }
        }

              // --- 4. SHEET MANAGEMENT ---

        function createNewSheet() {
            const name = prompt("Name your new board/sheet:");
            if(name) {
                const newId = 'sheet_' + generateId();
                appData.sheets[newId] = { id: newId, name: name, cards: [] };
                appData.activeSheetId = newId;
                saveData();
                renderApp();
            }
        }

        function switchSheet(sheetId) {
            appData.activeSheetId = sheetId;
            saveData();
            closeContextPanel();
            renderApp();
        }

        function deleteSheet(sheetId) {
            if(confirm("Are you sure you want to delete this entire sheet?")) {
                delete appData.sheets[sheetId];
                appData.activeSheetId = Object.keys(appData.sheets)[0];
                saveData();
                renderApp();
            }
        }

        // --- 5. CONTEXT VAULT (RIGHT SIDEBAR) ---

        function openContextPanel(cardId, itemId) {
            const sheet = appData.sheets[appData.activeSheetId];
            const card = sheet.cards.find(c => c.id === cardId);
            const item = card.items.find(i => i.id === itemId);
            
            currentContextCardId = cardId;
            currentContextItemId = itemId;

            document.getElementById('context-target-name').innerText = `${card.title} ➔ ${item.text}`;
            document.getElementById('context-textarea').value = item.context || "";
            document.getElementById('context-panel').classList.add('open');
        }

        function closeContextPanel() {
            document.getElementById('context-panel').classList.remove('open');
            currentContextCardId = null;
            currentContextItemId = null;
        }

        function saveContext() {
            if(!currentContextItemId) return;
            
            const sheet = appData.sheets[appData.activeSheetId];
            const card = sheet.cards.find(c => c.id === currentContextCardId);
            const item = card.items.find(i => i.id === currentContextItemId);
            
            item.context = document.getElementById('context-textarea').value;
            saveData();
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "✅ Saved!";
            setTimeout(() => btn.innerText = originalText, 1500);
        }

        // --- 6. DRAG & DROP LOGIC ---

        let activeCard = null;
        let startX, startY, initialCardX, initialCardY;

        function handleDragStart(e) {
            // Ignore if clicking on editable text or buttons
            if (e.target.hasAttribute('contenteditable') || e.target.tagName === 'BUTTON') return;

            activeCard = e.currentTarget.closest('.card');
            
            // Bring to front physically
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(c => {
                let z = parseInt(c.style.zIndex) || 1;
                if (z > 10) c.style.zIndex = z - 1;
            });
            activeCard.style.zIndex = 100;
            activeCard.classList.add('dragging');

            startX = e.clientX;
            startY = e.clientY;
            initialCardX = parseInt(activeCard.style.left) || 0;
            initialCardY = parseInt(activeCard.style.top) || 0;

            activeCard.setPointerCapture(e.pointerId);
            activeCard.addEventListener('pointermove', handleDragMove);
            activeCard.addEventListener('pointerup', handleDragEnd);
        }

        function handleDragMove(e) {
            if (!activeCard) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            activeCard.style.left = `${initialCardX + dx}px`;
            activeCard.style.top = `${initialCardY + dy}px`;
        }

        function handleDragEnd(e) {
            if (!activeCard) return;
            
            // Save new position to state
            const cardId = activeCard.dataset.cardId;
            const sheet = appData.sheets[appData.activeSheetId];
            const cardData = sheet.cards.find(c => c.id === cardId);
            
            if (cardData) {
                cardData.x = parseInt(activeCard.style.left);
                cardData.y = parseInt(activeCard.style.top);
                saveData();
            }

            activeCard.classList.remove('dragging');
            activeCard.releasePointerCapture(e.pointerId);
            activeCard.removeEventListener('pointermove', handleDragMove);
            activeCard.removeEventListener('pointerup', handleDragEnd);
            activeCard = null;
        }

        // --- 7. UTILS ---

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-grid');
        }

        // Initialize App
        renderApp();
    </script>
</body>
</html>
