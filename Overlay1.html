<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Expanding Watermark — Osvato Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --osu-pink: #ff66aa;
            --osu-pink-dark: #cc4488;
            --dark-base: #121216;
            --dark-deeper: #0a0a0c;
            --panel-bg: #1c1c22;
            --panel-border: rgba(255,255,255,0.08);
            --text-main: #ffffff;
            --text-muted: #8888a0;
            --accent-green: #00e676;
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            height: 100%; margin: 0; padding: 0;
            background-color: var(--dark-base); color: var(--text-main);
            font-family: 'Exo 2', sans-serif; overflow: hidden;
        }

        /* ─── HEADER ─── */
        header {
            background: var(--dark-deeper); padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,102,170,0.15);
            height: 64px; flex-shrink: 0;
        }
        .logo { font-weight: 900; font-size: 22px; text-decoration: none; color: white; letter-spacing: 0.5px; }
        .logo span { color: var(--osu-pink); }
        .page-title { font-size: 14px; font-weight: 800; color: white; }
        .back-btn {
            background: transparent; border: 1px solid var(--panel-border);
            color: var(--text-muted); padding: 7px 16px; border-radius: 6px;
            font-family: 'Exo 2'; font-weight: 700; font-size: 13px;
            cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block;
        }
        .back-btn:hover { color: white; border-color: rgba(255,255,255,0.25); }

        /* ─── LAYOUT ─── */
        .page-body { display: flex; flex-direction: column; height: 100vh; }
        .editor-row { display: flex; flex: 1; min-height: 0; }

        /* ─── LEFT: scrolls independently ─── */
        .left-panel {
            width: 300px; flex-shrink: 0;
            background: var(--dark-deeper);
            border-right: 1px solid var(--panel-border);
            overflow-y: auto; overflow-x: hidden;
        }
        .left-panel::-webkit-scrollbar { width: 5px; }
        .left-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .section { padding: 16px 20px; border-bottom: 1px solid var(--panel-border); }
        .section-title {
            font-size: 10px; font-weight: 800; letter-spacing: 1px;
            color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px;
        }

        .field { margin-bottom: 12px; }
        .field:last-child { margin-bottom: 0; }
        .field label { display: block; font-size: 11px; font-weight: 700; color: #aaa; margin-bottom: 5px; }
        .field input[type="text"] {
            width: 100%; background: var(--panel-bg); border: 1px solid var(--panel-border);
            color: white; padding: 8px 10px; border-radius: 5px;
            font-family: 'Exo 2'; font-size: 13px; font-weight: 600;
        }
        .field input[type="text"]:focus { outline: none; border-color: var(--osu-pink); }

        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .color-field label { display: block; font-size: 11px; font-weight: 700; color: #aaa; margin-bottom: 5px; }
        .color-field input[type="color"] {
            width: 100%; height: 34px; border-radius: 5px; padding: 2px 4px;
            background: var(--panel-bg); border: 1px solid var(--panel-border); cursor: pointer;
        }

        /* Shape buttons */
        .shape-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .shape-btn {
            background: var(--panel-bg); border: 1px solid var(--panel-border);
            color: var(--text-muted); padding: 10px 4px; border-radius: 5px;
            font-family: 'Exo 2'; font-weight: 700; font-size: 11px;
            cursor: pointer; transition: all 0.2s; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .shape-btn:hover { border-color: rgba(255,255,255,0.2); color: white; }
        .shape-btn.active { border-color: var(--osu-pink); color: var(--osu-pink); background: #1c1c22; }

        /* Shape icons inside buttons */
        .shape-icon { display: block; width: 20px; height: 16px; margin: 0 auto; }

        /* Range slider */
        .field input[type="range"] {
            width: 100%; -webkit-appearance: none; height: 4px;
            background: var(--panel-border); border-radius: 2px; cursor: pointer; margin-top: 4px;
        }
        .field input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: var(--osu-pink); cursor: pointer;
        }

        /* Image drop area */
        .image-drop {
            background: var(--panel-bg); border: 1px dashed var(--panel-border);
            border-radius: 6px; padding: 14px; text-align: center;
            cursor: pointer; transition: border-color 0.2s; margin-bottom: 10px;
        }
        .image-drop:hover { border-color: rgba(255,255,255,0.2); }
        .image-drop img {
            width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--osu-pink); display: block; margin: 0 auto 8px;
        }
        .image-drop p { margin: 0; font-size: 11px; color: var(--text-muted); }
        .image-drop strong { display: block; color: white; font-size: 12px; margin-bottom: 2px; }
        .image-drop input[type="file"] { display: none; }

        .obs-note {
            background: #1a1500; border: 1px solid #3a2d00;
            border-radius: 5px; padding: 9px 11px;
            font-size: 11px; color: #a88020; line-height: 1.6;
        }
        .obs-note code { color: #d4a030; }

        .pos-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Action buttons — solid pink */
        .action-btn {
            width: 100%; background: var(--osu-pink); color: white; border: none;
            padding: 10px; border-radius: 5px; font-family: 'Exo 2';
            font-weight: 800; font-size: 13px; cursor: pointer; transition: background 0.2s;
            margin-bottom: 8px;
        }
        .action-btn:last-child { margin-bottom: 0; }
        .action-btn:hover { background: var(--osu-pink-dark); }
        .action-btn.secondary {
            background: transparent; color: var(--text-muted);
            border: 1px solid var(--panel-border);
            font-weight: 700;
        }
        .action-btn.secondary:hover { color: #ff6b6b; border-color: rgba(255,80,80,0.4); background: transparent; }

        /* ─── RIGHT: never scrolls ─── */
        .right-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

        /* Tabs */
        .tabs {
            display: flex; background: var(--dark-deeper);
            border-bottom: 1px solid var(--panel-border); padding: 0 20px; flex-shrink: 0;
        }
        .tab {
            padding: 14px 18px; font-size: 13px; font-weight: 700;
            color: var(--text-muted); cursor: pointer; border: none;
            background: transparent; font-family: 'Exo 2';
            border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s;
        }
        .tab.active { color: white; border-bottom-color: var(--osu-pink); }
        .tab:hover:not(.active) { color: rgba(255,255,255,0.6); }

        .tab-pane { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
        .tab-pane.active { display: flex; }

        /* ─── PREVIEW AREA ─── */
        .preview-area {
            flex: 1; overflow: hidden; position: relative;
            background-color: #050508;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            animation: panBg 15s linear infinite;
        }
        @keyframes panBg { from { background-position: 0 0; } to { background-position: -40px -40px; } }

        /* The watermark lives directly in this div — no iframe */
        .preview-inner {
            width: 100%; height: 100%; position: relative; overflow: hidden;
        }

        .preview-footer {
            background: var(--dark-deeper); border-top: 1px solid var(--panel-border);
            padding: 10px 20px; display: flex; align-items: center; gap: 12px;
            font-size: 12px; flex-shrink: 0;
        }
        .preview-footer label { color: var(--text-muted); font-weight: 700; }
        .preview-footer select {
            background: var(--panel-bg); border: 1px solid var(--panel-border);
            color: white; padding: 5px 8px; border-radius: 4px;
            font-family: 'Exo 2'; font-size: 12px; font-weight: 600;
        }

        /* ─── WATERMARK COMPONENT (lives in preview-inner) ─── */
        #wm-root {
            position: absolute;
            top: 30px; left: 30px;
            perspective: 1000px;
            font-family: 'Exo 2', sans-serif;
        }
        .wm-3d-wrapper {
            animation: float3D 6s infinite ease-in-out;
            transform-style: preserve-3d;
        }
        .wm-shape {
            position: relative; height: 64px;
            border-radius: 32px; border: 4px solid #fff; overflow: hidden;
            background: linear-gradient(90deg, var(--wm-c1, #0391e2), var(--wm-c2, #52b8ff), var(--wm-c1, #0391e2));
            background-size: 200%;
            box-shadow: -5px 15px 25px rgba(0,0,0,0.4);
            animation: expandCollapse 10s infinite cubic-bezier(0.65, 0, 0.15, 1), moveBg 3s linear infinite;
        }
        /* Triangle particle */
        .wm-tri-shape {
            position: absolute; bottom: -20px; width: 0; height: 0;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 15px solid rgba(255,255,255,0.3);
            animation: miniFloat 3s infinite linear;
        }
        /* Circle particle */
        .wm-circle-shape {
            position: absolute; bottom: -20px;
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: miniFloat 3s infinite linear;
        }
        /* Diamond particle */
        .wm-diamond-shape {
            position: absolute; bottom: -20px;
            width: 10px; height: 10px;
            background: rgba(255,255,255,0.3);
            transform: rotate(45deg);
            animation: miniFloat 3s infinite linear;
        }
        .wm-content { display: flex; align-items: center; height: 100%; width: 230px; }
        .wm-icon { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding-left: 4.9px; }
        .wm-pic { width: 44px; height: 44px; border-radius: 50%; background: url('https://litter.catbox.moe/jqckapgn7924tm9q.png') center/cover; border: 2px solid #fff; }
        .wm-label { color: white; font-weight: 900; font-size: 18px; padding-left: 12px; white-space: nowrap; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        @keyframes float3D {
            0%, 100% { transform: rotateY(25deg) rotateX(10deg) translateY(0); }
            50% { transform: rotateY(15deg) rotateX(15deg) translateY(-10px); }
        }
        @keyframes expandCollapse {
            0%, 15% { width: 64px; }
            30%, 85% { width: 240px; }
            100% { width: 64px; }
        }
        @keyframes moveBg { to { background-position: 200% center; } }
        @keyframes miniFloat {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-80px) rotate(30deg); opacity: 0; }
        }

        /* ─── CODE PANE ─── */
        .code-toolbar {
            background: var(--dark-deeper); border-bottom: 1px solid var(--panel-border);
            padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .code-meta { display: flex; align-items: center; gap: 10px; }
        .lang-tag {
            background: rgba(255,102,170,0.1); border: 1px solid rgba(255,102,170,0.2);
            color: var(--osu-pink); padding: 3px 9px; border-radius: 4px;
            font-size: 11px; font-weight: 800;
        }
        .line-count { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .code-actions { display: flex; gap: 8px; }

        /* Solid pink action buttons in toolbar */
        .dl-btn {
            background: transparent; border: 1px solid var(--panel-border);
            color: var(--text-muted); padding: 7px 14px; border-radius: 5px;
            font-family: 'Exo 2'; font-weight: 700; font-size: 13px;
            cursor: pointer; transition: all 0.2s;
        }
        .dl-btn:hover { border-color: rgba(255,255,255,0.2); color: white; }

        .copy-code-btn {
            background: var(--osu-pink); color: white; border: none;
            padding: 7px 16px; border-radius: 5px; font-family: 'Exo 2';
            font-weight: 800; font-size: 13px; cursor: pointer; transition: background 0.2s;
        }
        .copy-code-btn:hover { background: var(--osu-pink-dark); }
        .copy-code-btn.copied { background: var(--accent-green); color: #000; }

        .img-warn {
            background: #1a1500; border-bottom: 1px solid #3a2d00;
            padding: 9px 20px; font-size: 11px; color: #a88020;
            line-height: 1.5; display: none; flex-shrink: 0;
        }
        .img-warn.show { display: block; }
        .img-warn code { color: #d4a030; font-size: 11px; }

        .code-scroll { flex: 1; overflow: auto; min-height: 0; }
        .code-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .code-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .code-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .code-scroll pre {
            margin: 0; padding: 20px;
            color: #b4c7e7; font-family: 'Courier New', Courier, monospace;
            font-size: 12px; line-height: 1.6; white-space: pre; min-width: max-content;
        }
    </style>
</head>
<body>
<div class="page-body">

    <header>
        <a href="Osvato.html" class="logo"><span>Os</span>vato.</a>
        <span class="page-title">3D Expanding Watermark</span>
        <a href="Osvato.html" class="back-btn">← Back</a>
    </header>

    <div class="editor-row">

        <!-- ─── LEFT PANEL ─── -->
        <aside class="left-panel">

            <div class="section">
                <div class="section-title">Colors</div>
                <div class="color-row">
                    <div class="color-field">
                        <label>Main Color</label>
                        <input type="color" id="color1" value="#0391e2">
                    </div>
                    <div class="color-field">
                        <label>Highlight</label>
                        <input type="color" id="color2" value="#52b8ff">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Text</div>
                <div class="field">
                    <label>Display Name</label>
                    <input type="text" id="wm-text" value="@Heaven501" placeholder="@YourName">
                </div>
            </div>

            <div class="section">
                <div class="section-title">Avatar</div>
                <div class="image-drop" id="image-drop">
                    <img id="preview-avatar" src="https://litter.catbox.moe/jqckapgn7924tm9q.png" alt="Avatar">
                    <strong>Click to upload</strong>
                    <p>browser preview only</p>
                    <input type="file" id="avatar-file" accept="image/*">
                </div>
                <div class="field">
                    <label>Image URL / OBS Local Path</label>
                    <input type="text" id="image-url" value="https://litter.catbox.moe/jqckapgn7924tm9q.png" placeholder="https:// or file:///C:/...">
                </div>
                <div class="obs-note">
                    For OBS local files:<br>
                    <code>file:///C:/StreamAssets/avatar.png</code>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Position</div>
                <div class="pos-row">
                    <div class="field">
                        <label>Top</label>
                        <input type="text" id="pos-top" value="30px">
                    </div>
                    <div class="field">
                        <label>Left</label>
                        <input type="text" id="pos-left" value="30px">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Particles</div>
                <div class="field">
                    <label>Shape</label>
                    <div class="shape-row">
                        <button class="shape-btn active" data-shape="triangle" onclick="setShape('triangle',this)">
                            <svg class="shape-icon" viewBox="0 0 20 18"><polygon points="10,1 19,17 1,17" fill="currentColor"/></svg>
                            Triangle
                        </button>
                        <button class="shape-btn" data-shape="circle" onclick="setShape('circle',this)">
                            <svg class="shape-icon" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="currentColor"/></svg>
                            Circle
                        </button>
                        <button class="shape-btn" data-shape="diamond" onclick="setShape('diamond',this)">
                            <svg class="shape-icon" viewBox="0 0 20 20"><polygon points="10,1 19,10 10,19 1,10" fill="currentColor"/></svg>
                            Diamond
                        </button>
                    </div>
                </div>
                <div class="color-field" style="margin-bottom:10px;">
                    <label>Particle Color</label>
                    <input type="color" id="particle-color" value="#ffffff">
                </div>
                <div class="field">
                    <label>Opacity — <span id="opacity-display">25%</span></label>
                    <input type="range" id="particle-opacity" min="0" max="100" value="25">
                </div>
            </div>

            <div class="section">
                <button class="action-btn" onclick="copyCode()">Copy Code</button>
                <button class="action-btn" onclick="downloadCode()">Download .html</button>
                <button class="action-btn secondary" onclick="resetAll()">↺ Reset to Defaults</button>
            </div>

        </aside>

        <!-- ─── RIGHT PANEL ─── -->
        <section class="right-panel">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('preview', this)">Live Preview</button>
                <button class="tab" onclick="switchTab('code', this)">Code</button>
            </div>

            <!-- PREVIEW TAB -->
            <div class="tab-pane active" id="tab-preview">
                <div class="preview-area" id="preview-area">
                    <div class="preview-inner">
                        <!-- Watermark rendered directly here, no iframe -->
                        <div id="wm-root">
                            <div class="wm-3d-wrapper">
                                <div class="wm-shape" id="wm-shape">
                                    <!-- particles injected by JS -->
                                    <div class="wm-content">
                                        <div class="wm-icon">
                                            <div class="wm-pic" id="wm-pic"></div>
                                        </div>
                                        <div class="wm-label" id="wm-label">@Heaven501</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="preview-footer">
                    <label>Background:</label>
                    <select id="bg-select" onchange="changeBg(this.value)">
                        <option value="#050508">Dark (default)</option>
                        <option value="#000000">Pure Black</option>
                        <option value="#1a1a2e">Deep Blue</option>
                        <option value="#2a1a2e">Purple</option>
                    </select>
                </div>
            </div>

            <!-- CODE TAB -->
            <div class="tab-pane" id="tab-code">
                <div class="code-toolbar">
                    <div class="code-meta">
                        <span class="lang-tag">HTML</span>
                        <span class="line-count" id="line-count"></span>
                    </div>
                    <div class="code-actions">
                        <button class="dl-btn" onclick="downloadCode()">Download .html</button>
                        <button class="copy-code-btn" id="copy-code-btn" onclick="copyCode()">Copy Code</button>
                    </div>
                </div>
                <div class="img-warn" id="img-warn">
                    ⚠ Local image detected. Make sure OBS can access: <code id="img-path"></code>
                </div>
                <div class="code-scroll">
                    <pre id="code-output"></pre>
                </div>
            </div>
        </section>

    </div>
</div>

<script>
    // ─── STATE ───────────────────────────────────────────────────────────
    const state = {
        color1: '#0391e2',
        color2: '#52b8ff',
        text: '@Heaven501',
        imageUrl: 'https://litter.catbox.moe/jqckapgn7924tm9q.png',
        posTop: '30px',
        posLeft: '30px',
        particleShape: 'triangle',
        particleColor: '#ffffff',
        particleOpacity: 0.25,
        bgColor: '#050508'
    };

    // ─── HELPERS ─────────────────────────────────────────────────────────
    function hexToRgba(hex, a) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${a.toFixed(2)})`;
    }

    // ─── UPDATE LIVE PREVIEW (direct DOM, no iframe) ──────────────────────
    function updatePreview() {
        const { color1, color2, text, imageUrl, posTop, posLeft, particleShape, particleColor, particleOpacity, bgColor } = state;
        const rgba = hexToRgba(particleColor, particleOpacity);

        // Background
        document.getElementById('preview-area').style.backgroundColor = bgColor;

        // Watermark position
        const root = document.getElementById('wm-root');
        root.style.top = posTop;
        root.style.left = posLeft;

        // Gradient colors via CSS custom properties on the shape
        const shape = document.getElementById('wm-shape');
        shape.style.setProperty('--wm-c1', color1);
        shape.style.setProperty('--wm-c2', color2);
        shape.style.backgroundImage = `linear-gradient(90deg, ${color1}, ${color2}, ${color1})`;

        // Text
        document.getElementById('wm-label').textContent = text;

        // Avatar image
        document.getElementById('wm-pic').style.backgroundImage = `url('${imageUrl}')`;

        // Particles — clear old, inject new
        const existingParticles = shape.querySelectorAll('.wm-particle');
        existingParticles.forEach(p => p.remove());

        const positions = [
            { left: '20%', delay: '0s' },
            { left: '60%', delay: '1.5s' }
        ];
        positions.forEach(pos => {
            const p = document.createElement('div');
            if (particleShape === 'triangle') {
                p.className = 'wm-tri-shape wm-particle';
                p.style.borderBottomColor = rgba;
            } else if (particleShape === 'circle') {
                p.className = 'wm-circle-shape wm-particle';
                p.style.background = rgba;
            } else if (particleShape === 'diamond') {
                p.className = 'wm-diamond-shape wm-particle';
                p.style.background = rgba;
            }
            p.style.left = pos.left;
            p.style.animationDelay = pos.delay;
            // Insert before .wm-content
            shape.insertBefore(p, shape.querySelector('.wm-content'));
        });
    }

    // ─── GENERATE EXPORT CODE ────────────────────────────────────────────
    function generateCode() {
        const { color1, color2, text, imageUrl, posTop, posLeft, particleShape, particleColor, particleOpacity } = state;
        const rgba = hexToRgba(particleColor, particleOpacity);
        const isLocal = imageUrl && !imageUrl.startsWith('http') && !imageUrl.startsWith('data:');

        let particleCSS = '';
        if (particleShape === 'triangle') {
            particleCSS = `\t\t.wm-tri {
\t\t\tposition: absolute; bottom: -20px; width: 0; height: 0;
\t\t\tborder-left: 10px solid transparent; border-right: 10px solid transparent;
\t\t\tborder-bottom: 15px solid ${rgba};
\t\t\tanimation: miniFloat 3s infinite linear;
\t\t}`;
        } else if (particleShape === 'circle') {
            particleCSS = `\t\t.wm-tri {
\t\t\tposition: absolute; bottom: -20px;
\t\t\twidth: 10px; height: 10px; border-radius: 50%;
\t\t\tbackground: ${rgba};
\t\t\tanimation: miniFloat 3s infinite linear;
\t\t}`;
        } else if (particleShape === 'diamond') {
            particleCSS = `\t\t.wm-tri {
\t\t\tposition: absolute; bottom: -20px;
\t\t\twidth: 10px; height: 10px;
\t\t\tbackground: ${rgba};
\t\t\ttransform: rotate(45deg);
\t\t\tanimation: miniFloat 3s infinite linear;
\t\t}`;
        }

        return `<!DOCTYPE html>
<html lang="en">
<head>
\t<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@900&display=swap" rel="stylesheet">
\t<style>
\t\t:root { --brand-blue: ${color1}; --light-blue: ${color2}; }

\t\t.wm-anchor {
\t\t\tposition: fixed; top: ${posTop}; left: ${posLeft}; perspective: 1000px; z-index: 9999; font-family: 'Exo 2', sans-serif;
\t\t}
\t\t.wm-3d-wrapper {
\t\t\tanimation: float3D 6s infinite ease-in-out;
\t\t\ttransform-style: preserve-3d;
\t\t}
\t\t.wm-shape {
\t\t\tposition: relative; height: 64px;
\t\t\tborder-radius: 32px; border: 4px solid #fff; overflow: hidden;
\t\t\tbackground: linear-gradient(90deg, var(--brand-blue), var(--light-blue), var(--brand-blue));
\t\t\tbackground-size: 200%;
\t\t\tbox-shadow: -5px 15px 25px rgba(0,0,0,0.2);
\t\t\tanimation: expandCollapse 10s infinite cubic-bezier(0.65, 0, 0.15, 1), moveBg 3s linear infinite;
\t\t}
${particleCSS}
\t\t.wm-content { display: flex; align-items: center; height: 100%; width: 230px; }
\t\t.wm-icon { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding-left: 4.9px; }
${isLocal ? '\t\t/* ⚠ Replace with a hosted URL or your actual local path */' : ''}\t\t.wm-pic { width: 44px; height: 44px; border-radius: 50%; background: url('${imageUrl}') center/cover; border: 2px solid #fff; }
\t\t.wm-text { color: white; font-weight: 900; font-size: 18px; padding-left: 12px; white-space: nowrap; }
\t\t@keyframes float3D {
\t\t\t0%, 100% { transform: rotateY(25deg) rotateX(10deg) translateY(0); }
\t\t\t50% { transform: rotateY(20deg) rotateX(15deg) translateY(-8px); }
\t\t}
\t\t@keyframes expandCollapse {
\t\t\t0%, 15% { width: 64px; }
\t\t\t30%, 85% { width: 240px; }
\t\t\t100% { width: 64px; }
\t\t}
\t\t@keyframes moveBg { to { background-position: 200% center; } }
\t\t@keyframes miniFloat {
\t\t\t0% { transform: translateY(0); opacity: 0; }
\t\t\t50% { opacity: 1; }
\t\t\t100% { transform: translateY(-80px) rotate(30deg); opacity: 0; }
\t\t}
\t</style>
</head>
<body>
\t<div class="wm-anchor">
\t\t<div class="wm-3d-wrapper">
\t\t\t<div class="wm-shape">
\t\t\t\t<div class="wm-tri" style="left: 20%; animation-delay: 0s;"></div>
\t\t\t\t<div class="wm-tri" style="left: 60%; animation-delay: 1.5s;"></div>
\t\t\t\t<div class="wm-content">
\t\t\t\t\t<div class="wm-icon"><div class="wm-pic"></div></div>
\t\t\t\t\t<div class="wm-text">${text}</div>
\t\t\t\t</div>
\t\t\t</div>
\t\t</div>
\t</div>
</body>
</html>`;
    }

    // ─── REFRESH: preview + code pane ────────────────────────────────────
    function refresh() {
        updatePreview();

        const code = generateCode();
        document.getElementById('code-output').textContent = code;
        document.getElementById('line-count').textContent = code.split('\n').length + ' lines';

        const isLocal = state.imageUrl && !state.imageUrl.startsWith('http') && !state.imageUrl.startsWith('data:');
        document.getElementById('img-path').textContent = state.imageUrl;
        document.getElementById('img-warn').classList.toggle('show', isLocal);
    }

    // ─── INPUT WIRING ────────────────────────────────────────────────────
    document.getElementById('color1').addEventListener('input', function() { state.color1 = this.value; refresh(); });
    document.getElementById('color2').addEventListener('input', function() { state.color2 = this.value; refresh(); });
    document.getElementById('wm-text').addEventListener('input', function() { state.text = this.value; refresh(); });
    document.getElementById('image-url').addEventListener('input', function() {
        state.imageUrl = this.value;
        document.getElementById('preview-avatar').src = this.value;
        refresh();
    });
    document.getElementById('pos-top').addEventListener('input', function() { state.posTop = this.value; refresh(); });
    document.getElementById('pos-left').addEventListener('input', function() { state.posLeft = this.value; refresh(); });
    document.getElementById('particle-color').addEventListener('input', function() { state.particleColor = this.value; refresh(); });
    document.getElementById('particle-opacity').addEventListener('input', function() {
        state.particleOpacity = parseInt(this.value) / 100;
        document.getElementById('opacity-display').textContent = this.value + '%';
        refresh();
    });

    // Avatar upload
    document.getElementById('image-drop').addEventListener('click', () => document.getElementById('avatar-file').click());
    document.getElementById('avatar-file').addEventListener('change', function() {
        if (!this.files[0]) return;
        const reader = new FileReader();
        reader.onload = e => {
            document.getElementById('preview-avatar').src = e.target.result;
            state.imageUrl = e.target.result;
            document.getElementById('image-url').value = '(uploaded — set a URL or OBS path for export)';
            refresh();
        };
        reader.readAsDataURL(this.files[0]);
    });

    function setShape(shape, btn) {
        state.particleShape = shape;
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        refresh();
    }

    function switchTab(name, btn) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        btn.classList.add('active');
    }

    function changeBg(val) {
        state.bgColor = val;
        document.getElementById('preview-area').style.backgroundColor = val;
    }

    function copyCode() {
        navigator.clipboard.writeText(generateCode()).then(() => {
            const btn = document.getElementById('copy-code-btn');
            const origText = btn.textContent;
            btn.textContent = '✓ Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = origText; btn.classList.remove('copied'); }, 2500);
        });
    }

    function downloadCode() {
        const blob = new Blob([generateCode()], { type: 'text/html' });
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(blob),
            download: 'osvato-3d-watermark.html'
        });
        a.click(); URL.revokeObjectURL(a.href);
    }

    function resetAll() {
        Object.assign(state, {
            color1:'#0391e2', color2:'#52b8ff', text:'@Heaven501',
            imageUrl:'https://litter.catbox.moe/jqckapgn7924tm9q.png',
            posTop:'30px', posLeft:'30px',
            particleShape:'triangle', particleColor:'#ffffff', particleOpacity:0.25,
            bgColor:'#050508'
        });
        document.getElementById('color1').value = '#0391e2';
        document.getElementById('color2').value = '#52b8ff';
        document.getElementById('wm-text').value = '@Heaven501';
        document.getElementById('image-url').value = state.imageUrl;
        document.getElementById('preview-avatar').src = state.imageUrl;
        document.getElementById('pos-top').value = '30px';
        document.getElementById('pos-left').value = '30px';
        document.getElementById('particle-color').value = '#ffffff';
        document.getElementById('particle-opacity').value = 25;
        document.getElementById('opacity-display').textContent = '25%';
        document.getElementById('bg-select').value = '#050508';
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('active', b.dataset.shape === 'triangle'));
        refresh();
    }

    // ─── INIT ────────────────────────────────────────────────────────────
    refresh();
</script>
</body>
</html>
