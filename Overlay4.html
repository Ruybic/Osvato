<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Frame — Osvato Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --osu-pink:#ff66aa; --osu-pink-dark:#cc4488; --dark-base:#121216; --dark-deeper:#0a0a0c; --panel-bg:#1c1c22; --panel-border:rgba(255,255,255,0.08); --text-main:#fff; --text-muted:#8888a0; --accent-green:#00e676; }
        *,*::before,*::after{box-sizing:border-box;}
        html,body{height:100%;margin:0;padding:0;background:var(--dark-base);color:var(--text-main);font-family:'Exo 2',sans-serif;overflow:hidden;}
        header{background:var(--dark-deeper);padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,102,170,0.15);height:64px;flex-shrink:0;}
        .logo{font-weight:900;font-size:22px;text-decoration:none;color:white;letter-spacing:0.5px;}.logo span{color:var(--osu-pink);}
        .page-title{font-size:14px;font-weight:800;color:white;}
        .back-btn{background:transparent;border:1px solid var(--panel-border);color:var(--text-muted);padding:7px 16px;border-radius:6px;font-family:'Exo 2';font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block;}
        .back-btn:hover{color:white;border-color:rgba(255,255,255,0.25);}
        .page-body{display:flex;flex-direction:column;height:100vh;}
        .editor-row{display:flex;flex:1;min-height:0;}
        .left-panel{width:300px;flex-shrink:0;background:var(--dark-deeper);border-right:1px solid var(--panel-border);overflow-y:auto;overflow-x:hidden;}
        .left-panel::-webkit-scrollbar{width:5px;}.left-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
        .section{padding:16px 20px;border-bottom:1px solid var(--panel-border);}
        .section-title{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;}
        .field{margin-bottom:12px;}.field:last-child{margin-bottom:0;}
        .field label{display:block;font-size:11px;font-weight:700;color:#aaa;margin-bottom:5px;}
        .field input[type="number"]{width:100%;background:var(--panel-bg);border:1px solid var(--panel-border);color:white;padding:8px 10px;border-radius:5px;font-family:'Exo 2';font-size:13px;font-weight:600;}
        .field input[type="number"]:focus{outline:none;border-color:var(--osu-pink);}
        .color-field label{display:block;font-size:11px;font-weight:700;color:#aaa;margin-bottom:5px;}
        .color-field input[type="color"]{width:100%;height:34px;border-radius:5px;padding:2px 4px;background:var(--panel-bg);border:1px solid var(--panel-border);cursor:pointer;}
        .dim-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .info-box{background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--text-muted);line-height:1.6;}
        .info-box strong{color:white;}
        .action-btn{width:100%;background:var(--osu-pink);color:white;border:none;padding:10px;border-radius:5px;font-family:'Exo 2';font-weight:800;font-size:13px;cursor:pointer;transition:background 0.2s;margin-bottom:8px;}
        .action-btn:last-child{margin-bottom:0;}.action-btn:hover{background:var(--osu-pink-dark);}
        .action-btn.secondary{background:transparent;color:var(--text-muted);border:1px solid var(--panel-border);font-weight:700;}
        .action-btn.secondary:hover{color:#ff6b6b;border-color:rgba(255,80,80,0.4);background:transparent;}
        .right-panel{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
        .tabs{display:flex;background:var(--dark-deeper);border-bottom:1px solid var(--panel-border);padding:0 20px;flex-shrink:0;}
        .tab{padding:14px 18px;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;border:none;background:transparent;font-family:'Exo 2';border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
        .tab.active{color:white;border-bottom-color:var(--osu-pink);}.tab:hover:not(.active){color:rgba(255,255,255,0.6);}
        .tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}.tab-pane.active{display:flex;}
        .preview-area{flex:1;overflow:hidden;position:relative;background-color:#050508;background-image:radial-gradient(rgba(255,255,255,0.1) 1.5px,transparent 1.5px);background-size:20px 20px;animation:panBg 15s linear infinite;display:flex;align-items:center;justify-content:center;}
        @keyframes panBg{from{background-position:0 0;}to{background-position:-40px -40px;}}
        .preview-footer{background:var(--dark-deeper);border-top:1px solid var(--panel-border);padding:10px 20px;display:flex;align-items:center;gap:12px;font-size:12px;flex-shrink:0;}
        .preview-footer label{color:var(--text-muted);font-weight:700;}
        .preview-footer select{background:var(--panel-bg);border:1px solid var(--panel-border);color:white;padding:5px 8px;border-radius:4px;font-family:'Exo 2';font-size:12px;font-weight:600;}

        /* NEON FRAME COMPONENT */
        #neon-frame{position:relative;background:transparent;border-radius:8px;box-shadow:0 15px 35px rgba(0,0,0,0.6);}
        #neon-border{position:absolute;inset:-2px;border-radius:10px;padding:2px;background:linear-gradient(135deg,#ff66aa,transparent,#ff66aa,transparent);background-size:300% 300%;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:frameRotate 6s linear infinite;}
        .node-corner{position:absolute;background:#fff;border-radius:50%;box-shadow:0 0 12px #fff,0 0 24px #ff66aa;animation:nodePulse 1.5s infinite ease-in-out;}
        .node-tl{animation-delay:0s;}.node-tr{animation-delay:0.3s;}.node-bl{animation-delay:0.6s;}.node-br{animation-delay:0.9s;}
        @keyframes frameRotate{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        @keyframes nodePulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.6);opacity:0.7;}}

        /* CODE */
        .code-toolbar{background:var(--dark-deeper);border-bottom:1px solid var(--panel-border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
        .code-meta{display:flex;align-items:center;gap:10px;}
        .lang-tag{background:rgba(255,102,170,0.1);border:1px solid rgba(255,102,170,0.2);color:var(--osu-pink);padding:3px 9px;border-radius:4px;font-size:11px;font-weight:800;}
        .line-count{font-size:11px;color:var(--text-muted);font-weight:600;}
        .code-actions{display:flex;gap:8px;}
        .dl-btn{background:transparent;border:1px solid var(--panel-border);color:var(--text-muted);padding:7px 14px;border-radius:5px;font-family:'Exo 2';font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;}
        .dl-btn:hover{border-color:rgba(255,255,255,0.2);color:white;}
        .copy-code-btn{background:var(--osu-pink);color:white;border:none;padding:7px 16px;border-radius:5px;font-family:'Exo 2';font-weight:800;font-size:13px;cursor:pointer;transition:background 0.2s;}
        .copy-code-btn:hover{background:var(--osu-pink-dark);}.copy-code-btn.copied{background:var(--accent-green);color:#000;}
        .code-scroll{flex:1;overflow:auto;min-height:0;}
        .code-scroll::-webkit-scrollbar{width:8px;height:8px;}.code-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
        .code-scroll pre{margin:0;padding:20px;color:#b4c7e7;font-family:'Courier New',monospace;font-size:12px;line-height:1.6;white-space:pre;min-width:max-content;}
    </style>
</head>
<body>
<div class="page-body">
    <header>
        <a href="Osvato.html" class="logo"><span>Os</span>vato.</a>
        <span class="page-title" id="page-title">Loading...</span>
        <a href="Osvato.html" class="back-btn">← Back</a>
    </header>
    <div class="editor-row">
        <aside class="left-panel">
            <div class="section">
                <div class="section-title">Color</div>
                <div class="color-field"><label>Frame Color</label><input type="color" id="frame-color" value="#ff66aa"></div>
            </div>
            <div class="section">
                <div class="section-title">Dimensions</div>
                <div class="dim-row">
                    <div class="field"><label>Width (px)</label><input type="number" id="frame-w" value="320" min="100" max="1920"></div>
                    <div class="field"><label>Height (px)</label><input type="number" id="frame-h" value="240" min="100" max="1080"></div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Corner Nodes</div>
                <div class="field"><label>Node Size (px)</label><input type="number" id="node-size" value="8" min="4" max="20"></div>
                <div class="field"><label>Pulse Speed (s)</label><input type="number" id="pulse-speed" value="1.5" min="0.5" max="5" step="0.1"></div>
            </div>
            <div class="section">
                <div class="section-title">Border Animation</div>
                <div class="field"><label>Rotation Speed (s)</label><input type="number" id="anim-speed" value="6" min="1" max="30" step="0.5"></div>
            </div>
            <div class="section">
                <div class="info-box"><strong>OBS Usage</strong><br>Set this as a Browser Source sized exactly to your frame dimensions. Layer it above your webcam or game capture source in the scene.</div>
            </div>
            <div class="section">
                <button class="action-btn" onclick="copyCode()">Copy Code</button>
                <button class="action-btn" onclick="downloadCode()">Download .html</button>
                <button class="action-btn secondary" onclick="resetAll()">↺ Reset</button>
            </div>
        </aside>

        <section class="right-panel">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('preview',this)">Live Preview</button>
                <button class="tab" onclick="switchTab('code',this)">Code</button>
            </div>
            <div class="tab-pane active" id="tab-preview">
                <div class="preview-area" id="preview-area">
                    <div id="neon-frame" style="width:320px;height:240px;">
                        <div id="neon-border"></div>
                        <div class="node-corner node-tl" id="node-tl" style="width:8px;height:8px;top:-4px;left:-4px;"></div>
                        <div class="node-corner node-tr" id="node-tr" style="width:8px;height:8px;top:-4px;right:-4px;"></div>
                        <div class="node-corner node-bl" id="node-bl" style="width:8px;height:8px;bottom:-4px;left:-4px;"></div>
                        <div class="node-corner node-br" id="node-br" style="width:8px;height:8px;bottom:-4px;right:-4px;"></div>
                    </div>
                </div>
                <div class="preview-footer">
                    <label>Background:</label>
                    <select id="bg-select" onchange="changeBg(this.value)">
                        <option value="#050508">Dark (default)</option>
                        <option value="#000000">Pure Black</option>
                        <option value="#1a1a2e">Deep Blue</option>
                        <option value="#2a1a2e">Purple</option>
                    </select>
                </div>
            </div>
            <div class="tab-pane" id="tab-code">
                <div class="code-toolbar">
                    <div class="code-meta"><span class="lang-tag">HTML</span><span class="line-count" id="line-count"></span></div>
                    <div class="code-actions">
                        <button class="dl-btn" onclick="downloadCode()">Download .html</button>
                        <button class="copy-code-btn" id="copy-code-btn" onclick="copyCode()">Copy Code</button>
                    </div>
                </div>
                <div class="code-scroll"><pre id="code-output"></pre></div>
            </div>
        </section>
    </div>
</div>
<script>
    let ITEM = null;
    const ITEM_ID = 4;
    const state = { frameColor:'#ff66aa', frameW:320, frameH:240, nodeSize:8, pulseSpeed:1.5, animSpeed:6, bgColor:'#050508' };

    async function loadItem() {
        try {
            const res = await fetch('Elements/Elements.json');
            const data = await res.json();
            ITEM = data.items.find(i => i.id === ITEM_ID);
            if (ITEM) { document.getElementById('page-title').textContent = ITEM.title; applyDefaults(ITEM.defaults); }
        } catch(e) { console.warn('Could not load Elements.json:', e); }
        refresh();
    }

    function applyDefaults(d) {
        state.frameColor = d.frameColor||'#ff66aa';
        state.frameW = d.frameWidth||320;
        state.frameH = d.frameHeight||240;
        state.nodeSize = d.nodeSize||8;
        state.pulseSpeed = d.pulseSpeed||1.5;
        state.animSpeed = d.animSpeed||6;
        document.getElementById('frame-color').value = state.frameColor;
        document.getElementById('frame-w').value = state.frameW;
        document.getElementById('frame-h').value = state.frameH;
        document.getElementById('node-size').value = state.nodeSize;
        document.getElementById('pulse-speed').value = state.pulseSpeed;
        document.getElementById('anim-speed').value = state.animSpeed;
    }

    function updatePreview() {
        const {frameColor,frameW,frameH,nodeSize,pulseSpeed,animSpeed,bgColor} = state;
        document.getElementById('preview-area').style.backgroundColor = bgColor;
        const frame = document.getElementById('neon-frame');
        frame.style.width = frameW+'px';
        frame.style.height = frameH+'px';
        const border = document.getElementById('neon-border');
        border.style.background = `linear-gradient(135deg,${frameColor},transparent,${frameColor},transparent)`;
        border.style.backgroundSize = '300% 300%';
        border.style.animationDuration = animSpeed+'s';
        const offset = -(nodeSize/2);
        [['node-tl','top','left'],['node-tr','top','right'],['node-bl','bottom','left'],['node-br','bottom','right']].forEach(([id,v,h])=>{
            const n = document.getElementById(id);
            n.style.width = nodeSize+'px'; n.style.height = nodeSize+'px';
            n.style[v] = offset+'px'; n.style[h] = offset+'px';
            n.style.boxShadow = `0 0 12px #fff,0 0 24px ${frameColor}`;
            n.style.animationDuration = pulseSpeed+'s';
        });
    }

    function generateCode() {
        if (!ITEM) return '';
        const {frameColor,frameW,frameH,nodeSize,pulseSpeed,animSpeed} = state;
        const offset = -(nodeSize/2);
        const code = `<!DOCTYPE html>\n<html lang="en">\n<head>\n\t<meta charset="UTF-8">\n\t<style>\n\t\t:root { --frame-color: ${frameColor}; }\n\t\tbody { margin:0; padding:0; background:transparent; width:${frameW}px; height:${frameH}px; overflow:hidden; }\n\t\t.neon-frame { position:relative; width:${frameW}px; height:${frameH}px; background:transparent; border-radius:8px; }\n\t\t.neon-border { position:absolute; inset:-2px; border-radius:10px; padding:2px; background:linear-gradient(135deg,var(--frame-color),transparent,var(--frame-color),transparent); background-size:300% 300%; -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; animation:frameRotate ${animSpeed}s linear infinite; }\n\t\t.node-corner { position:absolute; width:${nodeSize}px; height:${nodeSize}px; background:#fff; border-radius:50%; box-shadow:0 0 12px #fff,0 0 24px var(--frame-color); animation:nodePulse ${pulseSpeed}s infinite ease-in-out; }\n\t\t.node-tl { top:${offset}px; left:${offset}px; animation-delay:0s; }\n\t\t.node-tr { top:${offset}px; right:${offset}px; animation-delay:0.3s; }\n\t\t.node-bl { bottom:${offset}px; left:${offset}px; animation-delay:0.6s; }\n\t\t.node-br { bottom:${offset}px; right:${offset}px; animation-delay:0.9s; }\n\t\t@keyframes frameRotate { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }\n\t\t@keyframes nodePulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.6);opacity:0.7;} }\n\t</style>\n</head>\n<body>\n\t<div class="neon-frame">\n\t\t<div class="neon-border"></div>\n\t\t<div class="node-corner node-tl"></div>\n\t\t<div class="node-corner node-tr"></div>\n\t\t<div class="node-corner node-bl"></div>\n\t\t<div class="node-corner node-br"></div>\n\t</div>\n</body>\n</html>`;
        document.getElementById('code-output').textContent = code;
        document.getElementById('line-count').textContent = code.split('\n').length+' lines';
        return code;
    }

    function refresh(){updatePreview();generateCode();}

    document.getElementById('frame-color').addEventListener('input',function(){state.frameColor=this.value;refresh();});
    document.getElementById('frame-w').addEventListener('input',function(){state.frameW=parseInt(this.value)||320;refresh();});
    document.getElementById('frame-h').addEventListener('input',function(){state.frameH=parseInt(this.value)||240;refresh();});
    document.getElementById('node-size').addEventListener('input',function(){state.nodeSize=parseInt(this.value)||8;refresh();});
    document.getElementById('pulse-speed').addEventListener('input',function(){state.pulseSpeed=parseFloat(this.value)||1.5;refresh();});
    document.getElementById('anim-speed').addEventListener('input',function(){state.animSpeed=parseFloat(this.value)||6;refresh();});

    function changeBg(v){state.bgColor=v;document.getElementById('preview-area').style.backgroundColor=v;}
    function switchTab(n,b){document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+n).classList.add('active');b.classList.add('active');}
    function copyCode(){navigator.clipboard.writeText(generateCode()).then(()=>{const b=document.getElementById('copy-code-btn');b.textContent='✓ Copied!';b.classList.add('copied');setTimeout(()=>{b.textContent='Copy Code';b.classList.remove('copied');},2500);});}
    function downloadCode(){const blob=new Blob([generateCode()],{type:'text/html'});const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'osvato-neon-frame.html'});a.click();URL.revokeObjectURL(a.href);}
    function resetAll(){if(ITEM)applyDefaults(ITEM.defaults);document.getElementById('bg-select').value='#050508';changeBg('#050508');refresh();}

    loadItem();
</script>
</body>
</html>
